<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scrapebook</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="prompt-screen">
    <div id="prompt-wrap">
      <div id="prompt-row">
        <input id="topic-input" type="text" placeholder="a topic, a feeling, a year..." autocomplete="off" spellcheck="false" />
        <button id="generate-btn">generate</button>
      </div>
      <div id="progress-wrap" hidden>
        <div id="progress-bar"></div>
      </div>
    </div>
    <p id="status-text"></p>
  </div>

  <div id="canvas-screen" hidden>
    <div id="canvas"></div>
    <button id="reset-btn">↩ new topic</button>
    <button id="export-btn">↓ save png</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>window.SCRAPEBOOK_API_URL = "$SCRAPEBOOK_API_URL";</script>
  <script src="collage.js"></script>
</body>
</html>
