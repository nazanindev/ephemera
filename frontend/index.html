<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ephemera</title>
  <meta name="description" content="internet memory through collage" />
  <meta property="og:title" content="ephemera" />
  <meta property="og:description" content="internet memory through collage" />
  <meta property="og:url" content="https://frontend-production-02bfb.up.railway.app/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ephemera" />
  <meta name="twitter:description" content="internet memory through collage" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="prompt-screen">
    <div id="prompt-wrap">
      <div id="prompt-row">
        <input id="topic-input" type="text" placeholder="a topic, a feeling, a year..." autocomplete="off" spellcheck="false" />
        <button id="generate-btn">generate</button>
      </div>
      <div id="density-row">
        <button id="sparse-btn" class="density-btn" data-density="sparse">sparse</button>
        <button id="dense-btn" class="density-btn" data-density="dense">dense</button>
      </div>
      <div id="progress-wrap" hidden>
        <div id="progress-bar"></div>
      </div>
    </div>
    <p id="status-text"></p>
  </div>

  <div id="canvas-screen" hidden>
    <div id="canvas"></div>
    <div id="btn-row">
      <button id="reset-btn">↩ new topic</button>
      <button id="rearrange-btn">⇄ rearrange</button>
      <button id="export-btn">↓ save png</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>window.EPHEMERA_API_URL = "$EPHEMERA_API_URL";</script>
  <script src="collage.js"></script>
</body>
</html>
